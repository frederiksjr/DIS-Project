
<div id="erd" style="padding: 8px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryBorderColor: dark ? '#534AB7' : '#AFA9EC',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
    edgeLabelBackground: dark ? '#2C2C2A' : '#F1EFE8',
  },
});

const diagram = `erDiagram
  USER {
    uuid user_id PK
    string username
    string email
    string password_hash
    timestamp created_at
  }

  MOVIE {
    string imdb_id PK
    string title
    int release_year
    float avg_imdb_rating
    int imdb_vote_count
  }

  GENRE {
    int genre_id PK
    string name
  }

  MOVIE_GENRE {
    string imdb_id FK
    int genre_id FK
  }

  PERSON {
    int person_id PK
    string imdb_person_id
    string name
  }

  MOVIE_PERSON {
    string imdb_id FK
    int person_id FK
    string role
    int billing_order
  }

  KEYWORD {
    int keyword_id PK
    string term
  }

  MOVIE_KEYWORD {
    string imdb_id FK
    int keyword_id FK
  }

  USER_MOVIE {
    uuid entry_id PK
    uuid user_id FK
    string imdb_id FK
    boolean liked
    float user_rating
    timestamp logged_at
  }

  IMDB_RATING {
    uuid rating_id PK
    string imdb_id FK
    string imdb_user_id
    float rating
    timestamp rated_at
  }

  RECOMMENDATION_SESSION {
    uuid session_id PK
    uuid user_id FK
    int genre_id FK
    string mode
    timestamp created_at
  }

  SESSION_BASIS_MOVIE {
    uuid session_id FK
    string imdb_id FK
    boolean excluded
  }

  RECOMMENDATION_RESULT {
    uuid result_id PK
    uuid session_id FK
    string imdb_id FK
    int rank
    int supporting_user_count
    float knn_score
  }

  USER ||--o{ USER_MOVIE : "logs"
  MOVIE ||--o{ USER_MOVIE : "appears in"
  MOVIE ||--o{ MOVIE_GENRE : "tagged with"
  GENRE ||--o{ MOVIE_GENRE : "tags"
  MOVIE ||--o{ MOVIE_PERSON : "credits"
  PERSON ||--o{ MOVIE_PERSON : "appears in"
  MOVIE ||--o{ MOVIE_KEYWORD : "has"
  KEYWORD ||--o{ MOVIE_KEYWORD : "describes"
  MOVIE ||--o{ IMDB_RATING : "rated by"
  USER ||--o{ RECOMMENDATION_SESSION : "starts"
  GENRE ||--o{ RECOMMENDATION_SESSION : "filters by"
  RECOMMENDATION_SESSION ||--o{ SESSION_BASIS_MOVIE : "based on"
  MOVIE ||--o{ SESSION_BASIS_MOVIE : "used as basis"
  RECOMMENDATION_SESSION ||--o{ RECOMMENDATION_RESULT : "produces"
  MOVIE ||--o{ RECOMMENDATION_RESULT : "recommended as"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd .row-rect-odd path, #erd .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
